# =============================================================================
# APPLICATION.PROPERTIES — Configuration commune
# =============================================================================
# Profil actif : test | prod | vide
# - test  : base H2 fichier ./data/db-test  + données d'exemple (data-test.sql)
# - prod  : base H2 fichier ./data/db-prod  + base vide au premier démarrage
# - vide  : base H2 mémoire                 + base vide à chaque démarrage
#
# Pour changer de mode, modifiez la ligne ci-dessous :
spring.profiles.active=test

# JPA commun
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Console H2 désactivée (enregistrée manuellement via WebMvcConfig)
spring.h2.console.enabled=false

logging.level.org.springframework.web.servlet.resource=OFF
