# DataSource H2 (mode fichier)
spring.datasource.url=jdbc:h2:file:./data/db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Nťcessaire pour que data.sql s'exťcute aprŤs la crťation des tables Hibernate
spring.jpa.defer-datasource-initialization=true

# Console H2 \u2014 dťsactivťe ici car enregistrťe manuellement via WebMvcConfig
# (ťvite le conflit avec Spring MVC DispatcherServlet)
spring.h2.console.enabled=false

logging.level.org.springframework.web.servlet.resource=OFF