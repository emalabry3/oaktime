<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OakTime — Erreur de validation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/tache.css}"/>
  <style>
    .error-page {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 70vh; text-align: center; gap: 20px;
    }
    .error-icon { font-size: 3.5rem; }
    .error-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--text-primary); }
    .error-message {
      font-size: 0.95rem; color: var(--text-secondary);
      max-width: 480px; line-height: 1.7;
      background: var(--peach); border: 1.5px solid var(--peach-dark);
      border-radius: var(--radius-md); padding: 16px 24px;
    }
  </style>
</head>
<body>
<header class="page-header">
  <div class="header-inner">
    <div class="header-brand">
      <a th:href="@{/taches}" class="brand-link">
        <span class="brand-icon">🌿</span>
        <span class="brand-name">OakTime</span>
      </a>
    </div>
  </div>
</header>
<main class="page-main">
  <div class="error-page">
    <div class="error-icon">⚠️</div>
    <h1 class="error-title">Règle métier non respectée</h1>
    <p class="error-message" th:text="${messageErreur}">Message d'erreur</p>
    <button onclick="history.back()" class="btn btn-primary">← Retour au formulaire</button>
  </div>
</main>
</body>
</html>
