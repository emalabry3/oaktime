# =============================================================================
# PROFIL PROD — Base H2 fichier persistante + base vide au premier démarrage
# =============================================================================
spring.datasource.url=jdbc:h2:file:./data/db-prod;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

# Aucun script SQL chargé : la base est vide au premier démarrage
# et conservée entre les redémarrages
spring.sql.init.mode=never
